<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AVIZOR Fauna — Mapa interactivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body, #map { width:100%; height:100%; background:#0f1514; }

#loader {
  position:absolute; inset:0; background:#0f1514; z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#A9BFCF; font-family:'IBM Plex Mono',ui-monospace,monospace; font-size:13px; letter-spacing:3px; gap:12px;
}
.bar  { width:220px; height:2px; background:#23302d; border-radius:1px; }
.fill { height:100%; background:#3B66C2; border-radius:1px; transition:width 0.4s; }
#lmsg { font-size:10px; color:#5f6b69; letter-spacing:2px; }

#ui {
  position:absolute; top:12px; left:12px; z-index:10;
  display:flex; flex-direction:column; gap:7px;
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  max-height:calc(100vh - 24px); overflow-y:auto;
}
#ui::-webkit-scrollbar { width:3px; }
#ui::-webkit-scrollbar-thumb { background:#c7ced2; }

/* Paleta de la web principal: paper #f6f7f7 · ink #16191b · brand #3B66C2
   mist #eef1f0 · line #e2e5e6 · texto secundario #6b7378 */
.panel {
  background:rgba(246,247,247,0.96); border:1px solid #e2e5e6;
  border-radius:8px; padding:9px 12px;
  box-shadow:0 2px 10px rgba(22,25,27,.08);
}
.panel h1 {
  color:#16191b; font-size:12px; font-weight:600;
  text-transform:uppercase; letter-spacing:3px;
}
.sub { color:#6b7378; font-size:9px; letter-spacing:1px; margin-top:2px; }
.glabel {
  color:#6b7378; font-size:9px; letter-spacing:2px;
  margin-bottom:5px; text-transform:uppercase;
}
.bcol { display:flex; flex-direction:column; gap:3px; }

/* Secciones plegables (drop-downs) */
.sec .sechead {
  display:flex; align-items:center; justify-content:space-between; gap:14px;
  cursor:pointer; user-select:none; margin-bottom:0;
}
.sec.open .sechead { margin-bottom:5px; }
.sec .caret { font-size:8px; color:#6b7378; transition:transform .22s ease; transform:rotate(-90deg); }
.sec.open .caret { transform:rotate(0deg); }
/* Despliegue animado: altura + opacidad + ligero deslizamiento */
.sec .bcol {
  overflow:hidden; max-height:0; opacity:0; transform:translateY(-4px);
  transition:max-height .28s ease, opacity .22s ease, transform .22s ease;
}
.sec.open .bcol { max-height:220px; opacity:1; transform:translateY(0); }
.sec .sechead:hover .caret { color:#3B66C2; }

button {
  background:#ffffff; border:1px solid #e2e5e6; border-left-width:3px;
  color:#4a5257; font-family:'IBM Plex Mono',ui-monospace,monospace; font-size:10px;
  letter-spacing:0.5px; padding:5px 9px; cursor:pointer; border-radius:6px;
  text-align:left; white-space:nowrap; display:flex; align-items:center; gap:7px;
  transition:background 0.15s;
}
button:hover { background:#eef1f0; }
button.on { background:#EAF0FA; color:#2C4EA0; }

.sw { width:9px; height:9px; border-radius:1px; flex-shrink:0; }
.maplibregl-ctrl-attrib { font-size:9px !important; }

/* ── Leyenda (siempre visible) ─────────────────────────────────────────── */
#legend {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%); z-index:10;
  max-width:calc(100% - 24px);
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  background:rgba(246,247,247,0.72); border:1px solid rgba(226,229,230,.7);
  backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
  border-radius:8px; padding:7px 16px;
  box-shadow:0 2px 10px rgba(22,25,27,.08);
}
#legend-rows {
  display:flex; flex-wrap:nowrap; justify-content:center;
  column-gap:20px; overflow-x:auto;
}
#legend .row {
  display:flex; align-items:center; gap:8px;
  color:#4a5257; font-size:10px; letter-spacing:0.5px; padding:2px 0;
  white-space:nowrap;
}
#legend .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; border:1px solid rgba(22,25,27,.25); }
#legend .name { color:#16191b; font-weight:600; }
#legend .what { color:#6b7378; font-size:9px; }

/* ── Popup multimedia ──────────────────────────────────────────────────── */
.media-popup .maplibregl-popup-content {
  background:#ffffff; color:#16191b;
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  border:1px solid #e2e5e6; border-radius:10px;
  padding:0; width:240px; overflow:hidden;
  box-shadow:0 8px 28px rgba(15,25,35,.22);
}
.media-popup .maplibregl-popup-tip { border-top-color:#ffffff; border-bottom-color:#ffffff; }
.media-popup.maplibregl-popup-anchor-left  .maplibregl-popup-tip { border-right-color:#ffffff; }
.media-popup.maplibregl-popup-anchor-right .maplibregl-popup-tip { border-left-color:#ffffff; }
.media-popup .maplibregl-popup-close-button {
  color:#4a5257; font-size:16px; right:6px; top:4px; z-index:3;
  background:rgba(22,25,27,.08); border:none; padding:0; justify-content:center;
  border-radius:50%; width:20px; height:20px; line-height:18px;
}
.mp-tag {
  display:flex; align-items:center; gap:6px;
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  padding:7px 10px 5px;
}
.mp-tag .dot { width:8px; height:8px; border-radius:50%; }
.mp-media { position:relative; }
.mp-media img, .mp-media video { display:block; width:100%; height:130px; object-fit:cover; background:#000; }
.mp-slide { display:none; }
.mp-slide.on { display:block; }
.mp-nav {
  position:absolute; top:50%; transform:translateY(-50%);
  width:22px; height:22px; border-radius:50%; border:none; padding:0;
  background:rgba(15,21,20,.72); color:#eaf0fa; font-size:13px; line-height:22px;
  text-align:center; justify-content:center; cursor:pointer; z-index:2;
}
.mp-prev { left:6px; } .mp-next { right:6px; }
.mp-nav:hover { background:rgba(59,102,194,.85); }
.mp-count {
  position:absolute; bottom:5px; right:7px; z-index:2;
  font-size:8.5px; letter-spacing:1px; color:#eaf0fa;
  background:rgba(15,21,20,.72); border-radius:8px; padding:1px 6px;
}
.mp-dots { position:absolute; bottom:6px; left:0; right:0; display:flex; justify-content:center; gap:4px; z-index:1; }
.mp-dots span { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.4); }
.mp-dots span.on { background:#eaf0fa; }
.mp-title { color:#16191b; font-size:11px; font-weight:600; padding:8px 10px 2px; }
.mp-desc  { color:#6b7378; font-size:9.5px; line-height:1.5; padding:0 10px 10px; }

/* Popups fijados: arrastrables, con línea guía hacia su punto en el mapa */
.media-popup.pinned .maplibregl-popup-content { cursor:grab; }
.media-popup.pinned.dragging .maplibregl-popup-content { cursor:grabbing; }
#leaders {
  position:absolute; inset:0; width:100%; height:100%;
  pointer-events:none; z-index:60;
}
#leaders line   { stroke-dasharray:4 3; stroke-width:1.5; opacity:.9; }
#leaders circle { stroke:#ffffff; stroke-width:1.5; opacity:.95; }
</style>
</head>
<body>

<div id="loader">
  <div>AVIZOR FAUNA</div>
  <div class="bar"><div class="fill" id="prog" style="width:5%"></div></div>

</div>

<div id="ui" style="display:none">

  <div class="panel sec">

      <button id="btn-poi" data-i18n="poi"    style="border-left-color:#3B66C2" class="on">Iconos / POI</button>

    </div>
  </div>

</div>

<div id="legend" style="display:none">
  <div id="legend-rows"></div>
</div>

<script>
// ── I18N ──────────────────────────────────────────────────────────────────────
var MAP_LANG = (new URLSearchParams(location.search).get('lang') || 'es');
var I18N = {
  es: { style:'Estilo', topo:'Topográfico', roads:'Carreteras', view:'Vista',
        v_general:'Sierra de Collserola', v_jaen:'Jaén', v_sfrancia:'Sierra de Francia',
        legend:'Leyenda', terrain:'Relieve', t_exag:'Exagerado x1.5', t_real:'Real x1.0', t_flat:'Plano',
        visibility:'Visibilidad', poi:'Iconos / POI', labels:'Etiquetas',
        loading:'Cargando…', done:'Listo', l_lib:'Cargando MapLibre…', l_tiles:'Cargando teselas…', l_cfg:'Configurando…' },
  en: { style:'Style', topo:'Topographic', roads:'Roads', view:'View',
        v_general:'Sierra de Collserola', v_jaen:'Jaén', v_sfrancia:'Sierra de Francia',
        legend:'Legend', terrain:'Terrain', t_exag:'Exaggerated x1.5', t_real:'Real x1.0', t_flat:'Flat',
        visibility:'Visibility', poi:'Icons / POI', labels:'Labels',
        loading:'Loading…', done:'Ready', l_lib:'Loading MapLibre…', l_tiles:'Loading tiles…', l_cfg:'Configuring…' },
  pt: { style:'Estilo', topo:'Topográfico', roads:'Estradas', view:'Vista',
        v_general:'Sierra de Collserola', v_jaen:'Jaén', v_sfrancia:'Sierra de Francia',
        legend:'Legenda', terrain:'Relevo', t_exag:'Exagerado x1.5', t_real:'Real x1.0', t_flat:'Plano',
        visibility:'Visibilidade', poi:'Ícones / POI', labels:'Etiquetas',
        loading:'A carregar…', done:'Pronto', l_lib:'A carregar MapLibre…', l_tiles:'A carregar telas…', l_cfg:'A configurar…' },
  ca: { style:'Estil', topo:'Topogràfic', roads:'Carreteres', view:'Vista',
        v_general:'Serra de Collserola', v_jaen:'Jaén', v_sfrancia:'Sierra de Francia',
        legend:'Llegenda', terrain:'Relleu', t_exag:'Exagerat x1.5', t_real:'Real x1.0', t_flat:'Pla',
        visibility:'Visibilitat', poi:'Icones / POI', labels:'Etiquetes',
        loading:'Carregant…', done:'Llest', l_lib:'Carregant MapLibre…', l_tiles:'Carregant tessel·les…', l_cfg:'Configurant…' }
};
var L = I18N[MAP_LANG] || I18N.es;
function applyMapI18n(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k = el.getAttribute('data-i18n');
    if (L[k]) el.textContent = L[k];
  });
}
applyMapI18n();
</script>

<script src="data.js"></script>

<script>
// ── VISTAS ────────────────────────────────────────────────────────────────────
// La vista general encuadra TODOS los datos dibujados en Collserola.
// Jaén y Sierra de Francia son áreas de demostración (sin datos por ahora).
var DATA_BOUNDS = [[2.056,41.403],[2.128,41.451]];   // bbox de todas las capas
var VIEWS = [
  { key:'v_general',  kind:'bounds', bounds:DATA_BOUNDS, pitch:50, bearing:-10, zoomBoost:0.45 },
  { key:'v_jaen',     kind:'fly', center:[-3.507,38.395], zoom:13.1, pitch:50, bearing:0 },   // Despeñaperros (Jaén)
  { key:'v_sfrancia', kind:'fly', center:[-6.110,40.492], zoom:12.9, pitch:50, bearing:0 }    // La Alberca / Peña de Francia
];

var STYLES = {
  topo:  'https://tiles.openfreemap.org/styles/liberty',
  roads: 'https://tiles.openfreemap.org/styles/bright',
};
var TERRAIN = 'https://tiles.mapterhorn.com/tilejson.json';
var TERRAIN_ENCODING = 'terrarium';
var POI_KW  = ['poi','bus','transit','parking','aeroway','amenity','shop','tourism','worship','bicycle'];
var LBL_KW  = ['label','place','city','town','village','suburb','country','state'];

var isMobile = window.matchMedia('(max-width: 640px), (pointer: coarse)').matches;
var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ── AGRUPACIÓN DE ELEMENTOS ───────────────────────────────────────────────────
// Cada feature recibe properties.gid (grupo). Elementos "conectados" comparten
// gid y por tanto muestran el mismo contenido multimedia.
//  - Líneas: grupos definidos explícitamente (groupOf) o cada línea su grupo.
//  - Puntos: clustering por proximidad (puntos a <150 m se consideran conectados).
function distM(a,b){
  var R=6371000, dLat=(b[1]-a[1])*Math.PI/180, dLng=(b[0]-a[0])*Math.PI/180;
  var la1=a[1]*Math.PI/180, la2=b[1]*Math.PI/180;
  var h=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(h));
}
function assignGroups(layer){
  var feats = layer.data.features;
  if (layer.kind==='circle'){
    // union-find por proximidad
    var parent = feats.map(function(_,i){return i;});
    function find(x){ while(parent[x]!==x){ parent[x]=parent[parent[x]]; x=parent[x]; } return x; }
    for(var i=0;i<feats.length;i++)
      for(var j=i+1;j<feats.length;j++)
        if(distM(feats[i].geometry.coordinates, feats[j].geometry.coordinates) < 150){
          var ri=find(i), rj=find(j); if(ri!==rj) parent[rj]=ri;
        }
    var map_={}, next=0;
    feats.forEach(function(f,i){
      var r=find(i);
      if(!(r in map_)) map_[r]=next++;
      f.properties.gid = map_[r];
    });
    layer.nGroups = next;
  } else {
    var g = layer.groupOf || feats.map(function(_,i){return i;});
    feats.forEach(function(f,i){ f.properties.gid = g[i]; });
    layer.nGroups = Math.max.apply(null,g)+1;
  }
}
DATA_LAYERS.forEach(assignGroups);

// ── LEYENDA ───────────────────────────────────────────────────────────────────
(function(){
  var c=document.getElementById('legend-rows');
  DATA_LAYERS.forEach(function(l){
    var row=document.createElement('div'); row.className='row';
    row.innerHTML='<span class="dot" style="background:'+l.color+'"></span>'+
      '<span class="name">'+l.label+'</span> <span class="what">'+(l.what||'')+'</span>';
    c.appendChild(row);
  });
})();

// ── ESTADO ────────────────────────────────────────────────────────────────────
var map, terrainExag=1.5, poiOn=true, lblOn=true;

function setP(pct,msg){
  document.getElementById('prog').style.width=pct+'%';
  if(msg) document.getElementById('lmsg').textContent=msg;
}

setP(15, L.l_lib);

var uiShown=false;
function revealUI(){
  if(uiShown) return; uiShown=true;
  setP(100, L.done);
  setTimeout(function(){
    var l=document.getElementById('loader'); if(l) l.style.display='none';
    var u=document.getElementById('ui');     if(u) u.style.display='flex';
    var lg=document.getElementById('legend'); if(lg) lg.style.display='block';
  },300);
}
setTimeout(revealUI, 8000);

try {
  map = new maplibregl.Map({
    container:'map',
    attributionControl:false,
    style: STYLES.topo,
    center:[2.0925,41.4265], zoom:12.4, pitch:isMobile?42:50, bearing:-10,
    maxPitch:isMobile?70:85, antialias:!isMobile,
    minZoom: 4.5,
    maxZoom: 17
  });
} catch(err){
  console.error('No se ha podido crear el mapa:', err);
  var lm0=document.getElementById('lmsg'); if(lm0) lm0.textContent='Error cargando el mapa';
  revealUI();
}

if (map) {
  map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'top-right');
  map.addControl(new maplibregl.ScaleControl({unit:'metric'}),'bottom-right');

  setP(40, L.l_tiles);

  map.on('load', function(){
    setP(70, L.l_cfg);
    try { initLayers(); initPopups(); } catch(e){ console.warn('init:',e); }
    revealUI();
    flyToView(VIEWS[0], true);
  });

  map.on('idle', revealUI);

  // Las líneas guía siguen al mapa (pan/zoom/rotación reposicionan los popups).
  map.on('move', function(){ updateLeaders(); });

  map.on('error', function(e){
    var src = e && e.sourceId;
    if(src==='terrain' || src==='shade'){
      try { map.setTerrain(null); } catch(_) {}
    }
    console.warn('map error:', e && e.error ? e.error : e);
  });
}

// ── CAPAS ─────────────────────────────────────────────────────────────────────
function initLayers(){
  try {
    map.addSource('terrain',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
    map.setTerrain({source:'terrain',exaggeration:terrainExag});
    if(!isMobile){
      map.addSource('shade',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
      map.addLayer({id:'hillshade',type:'hillshade',source:'shade',
        paint:{'hillshade-shadow-color':'#1a2535','hillshade-highlight-color':'#c8d8f0','hillshade-exaggeration':0.4}});
    }
  } catch(e){ console.warn('terreno:', e); }

  // Capas de datos — SIEMPRE visibles (la leyenda las identifica)
  DATA_LAYERS.forEach(function(l){
    map.addSource(l.id+'-src',{type:'geojson',data:l.data});
    map.addLayer(dataLayerSpec(l,'visible'));
  });

  [[2.1194,41.4228,'Tibidabo 512m'],[2.0938,41.4373,'Magarola 483m']].forEach(function(p){
    var el=document.createElement('div');
    el.style.cssText='background:rgba(15,21,20,0.88);border-left:2px solid #A9BFCF;color:#eaf0fa;'+
      'font:9px \'IBM Plex Mono\',monospace;letter-spacing:1.5px;padding:2px 6px;'+
      'text-transform:uppercase;pointer-events:none;white-space:nowrap;';
    el.textContent=p[2];
    new maplibregl.Marker({element:el,anchor:'bottom-left'}).setLngLat([p[0],p[1]]).addTo(map);
  });
}

function dataLayerSpec(l, visibility){
  if(l.kind==='circle'){
    return {
      id:l.id, type:'circle', source:l.id+'-src',
      paint:{
        'circle-radius':['interpolate',['linear'],['zoom'],11,3,15,6,17,9],
        'circle-color':l.color,
        'circle-opacity':0.95,
        'circle-stroke-width':1.5,
        'circle-stroke-color':'#ffffff',
        'circle-stroke-opacity':0.85
      },
      layout:{'visibility':visibility}
    };
  }
  return {
    id:l.id, type:'line', source:l.id+'-src',
    paint:{'line-color':l.color,'line-width':l.width,'line-opacity':1.0},
    layout:{'line-cap':'round','line-join':'round','visibility':visibility}
  };
}

function readdDataLayers(){
  DATA_LAYERS.forEach(function(l){
    if(!map.getSource(l.id+'-src')){
      map.addSource(l.id+'-src',{type:'geojson',data:l.data});
    }
    if(!map.getLayer(l.id)){
      map.addLayer(dataLayerSpec(l,'visible'));
    }
  });
}

function applyTerrain(exag){
  if(!map) return;
  terrainExag=exag;
  try{
    if(!map.getSource('terrain')) map.addSource('terrain',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
    map.setTerrain(exag>0?{source:'terrain',exaggeration:exag}:null);
  }catch(e){}
}

function applyVis(){
  if(!map||!map.isStyleLoaded()) return;
  map.getStyle().layers.forEach(function(ly){
    var id=ly.id.toLowerCase();
    var skip=DATA_LAYERS.some(function(l){return l.id===ly.id;});
    if(skip||ly.id==='hillshade') return;
    if(POI_KW.some(function(k){return id.indexOf(k)>=0;})){
      map.setLayoutProperty(ly.id,'visibility',poiOn?'visible':'none');
    } else if(LBL_KW.some(function(k){return id.indexOf(k)>=0;})){
      map.setLayoutProperty(ly.id,'visibility',lblOn?'visible':'none');
    }
  });
}

// ── POPUPS MULTIMEDIA ─────────────────────────────────────────────────────────
// Hover = vista previa. Clic = fijar (se pueden fijar varios a la vez).
// Cada popup puede contener varias imágenes/vídeos (galería automática con flechas).
var hoverPopup=null, pinnedPopups={};   // pinnedPopups: clave layerId/gid → Popup

// El último popup tocado pasa siempre al frente (los fijados pueden solaparse).
var zTop=100;
function bringToFront(p){
  var el = p.getElement && p.getElement();
  if(el) el.style.zIndex = ++zTop;
}
function raiseOnInteract(p){
  var el = p.getElement && p.getElement();
  if(el) el.addEventListener('mousedown', function(){ bringToFront(p); }, true);
}

// ── LÍNEAS GUÍA (popup arrastrado → punto original en el mapa) ────────────────
var leaderSvg=null;
function ensureLeaderSvg(){
  if(leaderSvg) return leaderSvg;
  leaderSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  leaderSvg.id='leaders';
  map.getContainer().appendChild(leaderSvg);
  return leaderSvg;
}
function updateLeaders(){
  var contRect = map.getContainer().getBoundingClientRect();
  Object.keys(pinnedPopups).forEach(function(k){
    var p=pinnedPopups[k];
    if(!p._line) return;
    var a=map.project(p._anchor);
    var content=p.getElement() && p.getElement().querySelector('.maplibregl-popup-content');
    if(!content) return;
    var r=content.getBoundingClientRect();
    p._line.setAttribute('x1',a.x); p._line.setAttribute('y1',a.y);
    p._line.setAttribute('x2',r.left-contRect.left+r.width/2);
    p._line.setAttribute('y2',r.top-contRect.top+r.height/2);
    p._dot.setAttribute('cx',a.x); p._dot.setAttribute('cy',a.y);
  });
}
function setDetached(p){
  var moved = Math.abs(p._drag[0])>18 || Math.abs(p._drag[1])>18;
  var el=p.getElement();
  var tip=el && el.querySelector('.maplibregl-popup-tip');
  if(tip) tip.style.visibility = moved ? 'hidden' : 'visible';
  if(moved && !p._line){
    var svg=ensureLeaderSvg(), NS='http://www.w3.org/2000/svg';
    p._line=document.createElementNS(NS,'line');
    p._line.setAttribute('stroke',p._color);
    p._dot=document.createElementNS(NS,'circle');
    p._dot.setAttribute('r',4); p._dot.setAttribute('fill',p._color);
    svg.appendChild(p._line); svg.appendChild(p._dot);
  } else if(!moved && p._line){
    p._line.remove(); p._dot.remove(); p._line=null; p._dot=null;
  }
}
function removeLeader(p){
  if(p._line){ p._line.remove(); p._line=null; }
  if(p._dot){ p._dot.remove(); p._dot=null; }
}
// Arrastre del popup fijado (el punto de anclaje no cambia; la línea lo indica).
function makeDraggable(p){
  var el=p.getElement(); if(!el) return;
  var content=el.querySelector('.maplibregl-popup-content');
  content.addEventListener('mousedown', function(ev){
    if(ev.target.closest('.mp-nav') || ev.target.closest('.maplibregl-popup-close-button')) return;
    ev.preventDefault();
    el.classList.add('dragging');
    var sx=ev.clientX, sy=ev.clientY, base=p._drag.slice();
    function mm(e2){
      p._drag=[base[0]+e2.clientX-sx, base[1]+e2.clientY-sy];
      var o=[p._drag[0], p._drag[1]-14];
      if(p.setOffset){ p.setOffset(o); } else { p.options.offset=o; p._update && p._update(); }
      setDetached(p);
      updateLeaders();
    }
    function mu(){
      el.classList.remove('dragging');
      document.removeEventListener('mousemove',mm);
      document.removeEventListener('mouseup',mu);
    }
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });
}

function mediaItems(m){ return m.media || [{type:m.type, src:m.src}]; }

function slideHTML(it, on){
  var media = it.type==='video'
    ? '<video src="'+it.src+'"'+(on?' autoplay':'')+' muted loop playsinline></video>'
    : '<img src="'+it.src+'" alt="" loading="lazy">';
  return '<div class="mp-slide'+(on?' on':'')+'">'+media+'</div>';
}

function mediaHTML(layer, gid){
  var m = MEDIA[layer.id][gid % MEDIA[layer.id].length];
  var items = mediaItems(m);
  var slides = items.map(function(it,i){ return slideHTML(it, i===0); }).join('');
  var nav = items.length>1
    ? '<button class="mp-nav mp-prev" data-d="-1">‹</button>'+
      '<button class="mp-nav mp-next" data-d="1">›</button>'+
      '<div class="mp-count">1/'+items.length+'</div>'+
      '<div class="mp-dots">'+items.map(function(_,i){return '<span'+(i===0?' class="on"':'')+'></span>';}).join('')+'</div>'
    : '';
  return '<div class="mp-tag" style="color:'+layer.color+'">'+
           '<span class="dot" style="background:'+layer.color+'"></span>'+layer.label+
         '</div>'+
         '<div class="mp-media">'+slides+nav+'</div>'+
         '<div class="mp-title">'+m.title+'</div>'+
         '<div class="mp-desc">'+m.desc+'</div>';
}

// Avanza una galería un paso (dir = +1 / -1).
function stepGallery(box, dir){
  var slides = box.querySelectorAll('.mp-slide');
  if(slides.length<2) return;
  var dots = box.querySelectorAll('.mp-dots span');
  var cur = 0;
  slides.forEach(function(s,i){ if(s.classList.contains('on')) cur=i; });
  var next = (cur + dir + slides.length) % slides.length;
  slides.forEach(function(s,i){
    s.classList.toggle('on', i===next);
    var v=s.querySelector('video');
    if(v){ if(i===next){ v.play().catch(function(){}); } else { v.pause(); } }
  });
  dots.forEach(function(d,i){ d.classList.toggle('on', i===next); });
  var c=box.querySelector('.mp-count'); if(c) c.textContent=(next+1)+'/'+slides.length;
}

// Flechas: saltar manualmente (pausa el avance automático unos segundos).
document.addEventListener('click', function(ev){
  var btn = ev.target.closest && ev.target.closest('.mp-nav');
  if(!btn) return;
  ev.stopPropagation();
  var box = btn.closest('.mp-media');
  box.dataset.hold = Date.now();          // el usuario tomó el control
  stepGallery(box, +btn.dataset.d);
}, true);

// Carrusel automático: cada 4 s avanza todas las galerías visibles,
// salvo las que el usuario acaba de manejar (8 s de pausa tras usar flechas).
var AUTO_MS = 4000, HOLD_MS = 8000;
setInterval(function(){
  document.querySelectorAll('.mp-media').forEach(function(box){
    var hold = +box.dataset.hold || 0;
    if(Date.now() - hold < HOLD_MS) return;
    stepGallery(box, 1);
  });
}, AUTO_MS);

function initPopups(){
  DATA_LAYERS.forEach(function(l){
    map.on('mouseenter', l.id, function(){ map.getCanvas().style.cursor='pointer'; });
    map.on('mouseleave', l.id, function(){
      map.getCanvas().style.cursor='';
      if(hoverPopup){ hoverPopup.remove(); hoverPopup=null; }
    });
    map.on('mousemove', l.id, function(e){
      var f=e.features[0]; if(!f) return;
      var key=l.id+'/'+f.properties.gid;
      if(pinnedPopups[key]){                        // ya está fijado: sin preview
        if(hoverPopup){ hoverPopup.remove(); hoverPopup=null; }
        return;
      }
      var html=mediaHTML(l, f.properties.gid);
      if(!hoverPopup){
        hoverPopup=new maplibregl.Popup({closeButton:false,closeOnClick:false,className:'media-popup',offset:14,maxWidth:'260px'});
        hoverPopup.setLngLat(e.lngLat).setHTML(html).addTo(map);
        hoverPopup._gkey=key;
        bringToFront(hoverPopup);                   // preview por encima de lo fijado
      } else {
        hoverPopup.setLngLat(e.lngLat);
        if(hoverPopup._gkey!==key){ hoverPopup.setHTML(html); hoverPopup._gkey=key; }
      }
    });
    map.on('click', l.id, function(e){
      var f=e.features[0]; if(!f) return;
      var key=l.id+'/'+f.properties.gid;
      if(hoverPopup){ hoverPopup.remove(); hoverPopup=null; }
      if(pinnedPopups[key]){                        // ya fijado: traerlo al frente
        bringToFront(pinnedPopups[key]);
        return;
      }
      var p=new maplibregl.Popup({closeButton:true,closeOnClick:false,className:'media-popup pinned',
                                  anchor:'bottom',offset:[0,-14],maxWidth:'260px'});
      p.setLngLat(e.lngLat).setHTML(mediaHTML(l, f.properties.gid)).addTo(map);
      p._anchor=e.lngLat; p._drag=[0,0]; p._color=l.color;
      pinnedPopups[key]=p;
      bringToFront(p);                              // el recién abierto, al frente
      raiseOnInteract(p);                           // y al frente al volver a tocarlo
      makeDraggable(p);                             // arrastrable; línea guía al punto
      p.on('close',function(){ removeLeader(p); delete pinnedPopups[key]; });
      e.preventDefault && e.preventDefault();
    });
  });
}

// ── SECCIONES PLEGABLES DEL MENÚ ──────────────────────────────────────────────
document.querySelectorAll('.sec .sechead').forEach(function(h){
  h.addEventListener('click', function(){
    h.parentElement.classList.toggle('open');
  });
});

// ── BOTONES DE VISTA ──────────────────────────────────────────────────────────
function flyToView(v, instant){
  if(!map) return;
  var dur = (instant||reduceMotion) ? 0 : 2200;
  if(v.kind==='bounds'){
    var cam = map.cameraForBounds(v.bounds, {padding:{top:50,bottom:60,left:250,right:60}, bearing:v.bearing||0});
    if(cam) map.flyTo({center:cam.center, zoom:cam.zoom+(v.zoomBoost||0), pitch:v.pitch||0, bearing:v.bearing||0, duration:dur, essential:true});
  } else {
    map.flyTo({center:v.center, zoom:v.zoom, pitch:v.pitch||0, bearing:v.bearing||0, duration:dur, essential:true});
  }
}
(function(){
  var c=document.getElementById('view-btns');
  VIEWS.forEach(function(v,i){
    var btn=document.createElement('button');
    btn.textContent=L[v.key]||v.key;
    btn.style.borderLeftColor = i===0?'#3B66C2':'#cfd6d9';
    if(i===0) btn.classList.add('on');
    btn.addEventListener('click',function(){
      c.querySelectorAll('button').forEach(function(b){ b.classList.remove('on'); b.style.borderLeftColor='#cfd6d9'; });
      btn.classList.add('on'); btn.style.borderLeftColor='#3B66C2';
      flyToView(v,false);
    });
    c.appendChild(btn);
  });
})();

// ── ESTILO ────────────────────────────────────────────────────────────────────
['topo','roads'].forEach(function(k){
  document.getElementById('sty-'+k).addEventListener('click',function(){
    ['topo','roads'].forEach(function(s){
      var b=document.getElementById('sty-'+s);
      b.classList.toggle('on',s===k);
      b.style.borderLeftColor=s===k?'#3B66C2':'#cfd6d9';
    });
    map.setStyle(STYLES[k]);
    map.once('style.load',function(){
      map.addSource('terrain',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
      map.setTerrain(terrainExag>0?{source:'terrain',exaggeration:terrainExag}:null);
      if(!isMobile){
        map.addSource('shade',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
        map.addLayer({id:'hillshade',type:'hillshade',source:'shade',
          paint:{'hillshade-shadow-color':'#1a2535','hillshade-highlight-color':'#c8d8f0','hillshade-exaggeration':0.4}});
      }
      readdDataLayers();
      applyVis();
    });
  });
});
