html, body, #map { width:100%; height:100%; background:#0f1514; }

var STYLES = {
  topo:  'https://tiles.openfreemap.org/styles/liberty',
  roads: 'https://tiles.openfreemap.org/styles/bright',
};
var TERRAIN = 'https://tiles.mapterhorn.com/tilejson.json';
// Mapterhorn sirve DEM con codificación "terrarium"; hay que declararla o
// MapLibre la interpreta como "mapbox" y el relieve 3D se rompe.
var TERRAIN_ENCODING = 'terrarium';
var POI_KW  = ['poi','bus','transit','parking','aeroway','amenity','shop','tourism','worship','bicycle'];
var LBL_KW  = ['label','place','city','town','village','suburb','country','state'];

// ── DETECCIÓ DE DISPOSITIU (rendiment) ────────────────────────────────────────
// En mòbils i pantalles petites reduïm càrrega: sense antialias, sense
// hillshade i amb menys inclinació inicial.
var isMobile = window.matchMedia('(max-width: 640px), (pointer: coarse)').matches;
var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ── ESTAT ─────────────────────────────────────────────────────────────────────
var map, terrainExag=1.5, poiOn=true, lblOn=true;
var active={};
DATA_LAYERS.forEach(function(l){ active[l.id]=false; });

// ── UTILS ─────────────────────────────────────────────────────────────────────
function setP(pct,msg){
  document.getElementById('prog').style.width=pct+'%';
  if(msg) document.getElementById('lmsg').textContent=msg;
}

// ── INICIALITZAR MAPA ─────────────────────────────────────────────────────────
setP(15, L.l_lib);

// Amaga el carregador una sola vegada (evita quedar-se penjat si hi ha errors).
var uiShown=false;
function revealUI(){
  if(uiShown) return; uiShown=true;
  setP(100, L.done);
  setTimeout(function(){
    var l=document.getElementById('loader'); if(l) l.style.display='none';
    var u=document.getElementById('ui');     if(u) u.style.display='flex';
  },300);
}

// Xarxa de seguretat: mostra la UI passi el que passi, encara que la creació
// del mapa o la càrrega de tiles falli. Es defineix ABANS de crear el mapa
// perquè s'executi encara que el constructor llanci una excepció.
setTimeout(revealUI, 8000);

try {
  map = new maplibregl.Map({
    container:'map',
    style: STYLES.topo,
    center:[2.094,41.435], zoom:11.8, pitch:isMobile?42:55, bearing:-10,
    maxPitch:isMobile?70:85, antialias:!isMobile,
    maxBounds:[[1.85,41.28],[2.32,41.62]],
    minZoom: 11.5,
    maxZoom: 17
  });
} catch(err){
  console.error('No s\'ha pogut crear el mapa:', err);
  var lm0=document.getElementById('lmsg'); if(lm0) lm0.textContent='Error carregant el mapa';
  revealUI();
}

if (map) {
  map.addControl(new maplibregl.NavigationControl({visualizePitch:true}),'top-right');
  map.addControl(new maplibregl.ScaleControl({unit:'metric'}),'bottom-right');

  setP(40, L.l_tiles);

  map.on('load', function(){
    setP(70, L.l_cfg);
    try { initLayers(); } catch(e){ console.warn('initLayers:',e); }
    revealUI();
  });

  // 'idle' es dispara quan el mapa acaba de renderitzar: xarxa de seguretat extra.
  map.on('idle', revealUI);

  // Si falla el DEM del terreny (font externa), desactiva el relleu perquè el
  // mapa base es renderitzi igualment en pla en lloc de quedar-se en blanc.
  map.on('error', function(e){
    var src = e && e.sourceId;
    if(src==='terrain' || src==='shade'){
      try { map.setTerrain(null); } catch(_) {}
    }
    console.warn('map error:', e && e.error ? e.error : e);
  });
}

// ── CAPES ─────────────────────────────────────────────────────────────────────
function initLayers(){
  // Terreny (DEM amb codificació terrarium). No és crític: si falla, el mapa
  // base i les capes de dades s'han de renderitzar igualment.
  try {
    map.addSource('terrain',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
    map.setTerrain({source:'terrain',exaggeration:terrainExag});
    // El hillshade reutilitza una segona font DEM completa: costós. Només en
    // dispositius no-mòbils.
    if(!isMobile){
      map.addSource('shade',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
      map.addLayer({id:'hillshade',type:'hillshade',source:'shade',
        paint:{'hillshade-shadow-color':'#1a2535','hillshade-highlight-color':'#c8d8f0','hillshade-exaggeration':0.4}});
    }
  } catch(e){ console.warn('terreny:', e); }

  // Capes de dades — totes invisibles per defecte
  DATA_LAYERS.forEach(function(l){
    map.addSource(l.id+'-src',{type:'geojson',data:l.data});
    map.addLayer(dataLayerSpec(l,'none'));
  });

  // Marcadors de cim
  [[2.1194,41.4228,'Tibidabo 512m'],[2.0938,41.4373,'Magarola 483m']].forEach(function(p){
    var el=document.createElement('div');
    el.style.cssText='background:rgba(15,21,20,0.88);border-left:2px solid #A9BFCF;color:#eaf0fa;'+
      'font:9px \'IBM Plex Mono\',monospace;letter-spacing:1.5px;padding:2px 6px;'+
      'text-transform:uppercase;pointer-events:none;white-space:nowrap;';
    el.textContent=p[2];
    new maplibregl.Marker({element:el,anchor:'bottom-left'}).setLngLat([p[0],p[1]]).addTo(map);
  });
}

// Construeix l'especificació de capa segons el tipus de geometria:
// 'circle' per a punts (p. ex. balises Fauna-B) i 'line' per a traçats.
function dataLayerSpec(l, visibility){
  if(l.kind==='circle'){
    return {
      id:l.id, type:'circle', source:l.id+'-src',
      paint:{
        'circle-radius':['interpolate',['linear'],['zoom'],11,3,15,6,17,9],
        'circle-color':l.color,
        'circle-opacity':0.95,
        'circle-stroke-width':1.5,
        'circle-stroke-color':'#ffffff',
        'circle-stroke-opacity':0.85
      },
      layout:{'visibility':visibility}
    };
  }
  return {
    id:l.id, type:'line', source:l.id+'-src',
    paint:{'line-color':l.color,'line-width':l.width,'line-opacity':1.0},
    layout:{'line-cap':'round','line-join':'round','visibility':visibility}
  };
}

// Re-afegir les capes de dades despres de canvi d'estil
function readdDataLayers(){
  DATA_LAYERS.forEach(function(l){
    if(!map.getSource(l.id+'-src')){
      map.addSource(l.id+'-src',{type:'geojson',data:l.data});
    }
    if(!map.getLayer(l.id)){
      map.addLayer(dataLayerSpec(l, active[l.id]?'visible':'none'));
    }
  });
}

function applyTerrain(exag){
  if(!map) return;
  terrainExag=exag;
  try{
    if(!map.getSource('terrain')) map.addSource('terrain',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
    map.setTerrain(exag>0?{source:'terrain',exaggeration:exag}:null);
  }catch(e){}
}

function applyVis(){
  if(!map||!map.isStyleLoaded()) return;
  map.getStyle().layers.forEach(function(ly){
    var id=ly.id.toLowerCase();
    var skip=DATA_LAYERS.some(function(l){return l.id===ly.id;});
    if(skip||ly.id==='hillshade') return;
    if(POI_KW.some(function(k){return id.indexOf(k)>=0;})){
      map.setLayoutProperty(ly.id,'visibility',poiOn?'visible':'none');
    } else if(LBL_KW.some(function(k){return id.indexOf(k)>=0;})){
      map.setLayoutProperty(ly.id,'visibility',lblOn?'visible':'none');
    }
  });
}

// ── CONSTRUIR BOTONS DE DADES ─────────────────────────────────────────────────
(function(){
  var c=document.getElementById('data-btns');
  DATA_LAYERS.forEach(function(l){
    var btn=document.createElement('button');
    btn.style.borderLeftColor=l.color;
    var sw=document.createElement('span');
    sw.className='sw'; sw.style.background=l.color;
    btn.appendChild(sw);
    btn.appendChild(document.createTextNode(l.label));
    btn.addEventListener('click',function(){
      if(!map.isStyleLoaded()||!map.getLayer(l.id)) return;
      active[l.id]=!active[l.id];
      map.setLayoutProperty(l.id,'visibility',active[l.id]?'visible':'none');
      btn.classList.toggle('on',active[l.id]);
      if(l.fly && active[l.id]){
        map.flyTo({center:[l.fly[0],l.fly[1]],zoom:l.fly[2],pitch:l.fly[3],bearing:l.fly[4],duration:reduceMotion?0:1500});
      }
    });
    c.appendChild(btn);
  });
})();

// ── ESTIL ─────────────────────────────────────────────────────────────────────
['topo','roads'].forEach(function(k){
  document.getElementById('sty-'+k).addEventListener('click',function(){
    ['topo','roads'].forEach(function(s){
      var b=document.getElementById('sty-'+s);
      b.classList.toggle('on',s===k);
      b.style.borderLeftColor=s===k?'#3B66C2':'#455057';
    });
    map.setStyle(STYLES[k]);
    map.once('style.load',function(){
      map.addSource('terrain',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
      map.setTerrain(terrainExag>0?{source:'terrain',exaggeration:terrainExag}:null);
      if(!isMobile){
        map.addSource('shade',{type:'raster-dem',url:TERRAIN,tileSize:512,encoding:TERRAIN_ENCODING});
        map.addLayer({id:'hillshade',type:'hillshade',source:'shade',
          paint:{'hillshade-shadow-color':'#1a2535','hillshade-highlight-color':'#c8d8f0','hillshade-exaggeration':0.4}});
      }
      readdDataLayers();
      applyVis();
    });
  });
});

// ── VISTES ────────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-fly]').forEach(function(btn){
  btn.addEventListener('click',function(){
    var p=btn.dataset.fly.split(',').map(Number);
    map.flyTo({center:[p[1],p[0]],zoom:p[2],pitch:p[3],bearing:p[4],duration:reduceMotion?0:1800,essential:true});
  });
});

// ── TERRENY ───────────────────────────────────────────────────────────────────
[['ter-15',1.5],['ter-10',1.0],['ter-0',0]].forEach(function(pair){
  document.getElementById(pair[0]).addEventListener('click',function(){
    applyTerrain(pair[1]);
    [['ter-15',1.5],['ter-10',1.0],['ter-0',0]].forEach(function(p){
      var b=document.getElementById(p[0]);
      b.classList.toggle('on',p[1]===pair[1]);
      b.style.borderLeftColor=p[1]===pair[1]?'#3B66C2':'#455057';
    });
  });
});

// ── VISIBILITAT ───────────────────────────────────────────────────────────────
document.getElementById('btn-poi').addEventListener('click',function(){
  poiOn=!poiOn;
  this.classList.toggle('on',poiOn);
  this.style.borderLeftColor=poiOn?'#3B66C2':'#455057';
  applyVis();
});
document.getElementById('btn-lbl').addEventListener('click',function(){
  lblOn=!lblOn;
  this.classList.toggle('on',lblOn);
  this.style.borderLeftColor=lblOn?'#3B66C2':'#455057';
  applyVis();
});
</script>
